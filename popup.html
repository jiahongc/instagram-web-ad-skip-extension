<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Instagram Ad Skipper</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --fg: #1c1c1e;
        --muted: #6b7280;
        --border: #e5e7eb;
        --surface: #f8fafc;
        --accent: #d62976;
        --accent-soft: #fce7f3;
        --on: #0a84ff;
      }
      * { box-sizing: border-box; }
      html, body { background: var(--bg); color: var(--fg); }
      body {
        font: 13px/1.35 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
        width: 260px;
        margin: 0;
        padding: 14px 14px 12px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      header h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
      }
      .row .label { font-weight: 500; }
      .switch { position: relative; display: inline-block; width: 38px; height: 22px; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute; inset: 0; background: #cbd5e1; border-radius: 22px;
        transition: .15s; cursor: pointer;
      }
      .slider::before {
        content: ""; position: absolute; height: 16px; width: 16px;
        left: 3px; top: 3px; background: #fff; border-radius: 50%;
        transition: .15s; box-shadow: 0 1px 2px rgba(0,0,0,0.15);
      }
      input:checked + .slider { background: var(--on); }
      input:checked + .slider::before { transform: translateX(16px); }

      .stats {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .stats-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        padding: 10px 12px 8px;
        border-bottom: 1px solid var(--border);
        background: #fff;
      }
      .stats-head .title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }
      .stats-head .date {
        font-size: 11px;
        color: var(--muted);
      }
      .total {
        padding: 10px 12px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        background: #fff;
      }
      .total .num {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .total .sub {
        color: var(--muted);
        font-size: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        background: var(--border);
        gap: 1px;
      }
      .cell {
        background: #fff;
        padding: 9px 10px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }
      .cell .k {
        font-size: 10.5px;
        text-transform: uppercase;
        color: var(--muted);
        letter-spacing: 0.05em;
      }
      .cell .v {
        font-size: 17px;
        font-weight: 600;
        margin-top: 1px;
      }
      .network {
        padding: 9px 12px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #fff;
        font-size: 12px;
      }
      .network .k { color: var(--muted); }
      .network .v { font-weight: 600; }

      .week {
        margin-top: 10px;
        font-size: 11.5px;
        color: var(--muted);
        text-align: center;
      }
      .week strong { color: var(--fg); font-weight: 600; }

      footer {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: var(--muted);
      }
      footer a { color: var(--muted); text-decoration: none; }
      footer a:hover { color: var(--fg); }
      .reset {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 11px;
        cursor: pointer;
        padding: 2px 4px;
      }
      .reset:hover { color: var(--accent); }
    </style>
  </head>
  <body>
    <header>
      <span class="dot"></span>
      <h1>Instagram Ad Skipper</h1>
    </header>

    <div class="row">
      <span class="label">Auto-skip ads</span>
      <label class="switch">
        <input id="toggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>

    <section class="stats" aria-label="Today's stats">
      <div class="stats-head">
        <span class="title">Today</span>
        <span class="date" id="date"></span>
      </div>
      <div class="total">
        <div>
          <div class="num" id="total">0</div>
          <div class="sub">ads skipped today</div>
        </div>
      </div>
      <div class="grid">
        <div class="cell">
          <span class="k">Reels</span>
          <span class="v" id="reel">0</span>
        </div>
        <div class="cell">
          <span class="k">Stories</span>
          <span class="v" id="story">0</span>
        </div>
        <div class="cell">
          <span class="k">Feed</span>
          <span class="v" id="feed">0</span>
        </div>
      </div>
      <div class="network">
        <span class="k">Network-blocked</span>
        <span class="v" id="network">0</span>
      </div>
    </section>

    <div class="week">Last 7 days: <strong id="week">0</strong></div>

    <footer>
      <span id="version">v0.3</span>
      <button class="reset" id="reset" title="Clear all stats">Reset stats</button>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
