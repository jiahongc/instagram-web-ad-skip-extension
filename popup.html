<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Instagram Ad Skipper</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 14px -apple-system, system-ui, sans-serif;
        width: 240px;
        margin: 0;
        padding: 14px 16px;
      }
      h1 { font-size: 14px; margin: 0 0 10px; }
      .row { display: flex; align-items: center; justify-content: space-between; }
      .status { font-size: 12px; opacity: 0.7; margin-top: 8px; }
      .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute; inset: 0; background: #999; border-radius: 22px;
        transition: .15s; cursor: pointer;
      }
      .slider::before {
        content: ""; position: absolute; height: 16px; width: 16px;
        left: 3px; top: 3px; background: white; border-radius: 50%; transition: .15s;
      }
      input:checked + .slider { background: #0a84ff; }
      input:checked + .slider::before { transform: translateX(18px); }
    </style>
  </head>
  <body>
    <h1>Instagram Ad Skipper</h1>
    <div class="row">
      <span>Auto-skip ads</span>
      <label class="switch">
        <input id="toggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="status" id="status">Works on reels, stories, and feed.</div>
    <div class="status" style="margin-top:6px;opacity:.55;">v0.2 — network + DOM skip.</div>
    <script src="popup.js"></script>
  </body>
</html>
